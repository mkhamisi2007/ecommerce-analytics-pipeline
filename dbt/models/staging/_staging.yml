version: 2

models:
  - name: stg_orders
    description: "Cleaned and typed orders from the raw source"
    columns:
      - name: order_id
        description: "Primary key — unique order identifier"
        data_tests: [not_null, unique]
      - name: customer_id
        data_tests: [not_null]
      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              values: ["delivered", "shipped", "canceled", "processing",
                       "invoiced", "unavailable", "approved", "created"]
      - name: order_purchase_date
        data_tests: [not_null]

  - name: stg_order_items
    description: "Line items per order with price and freight cast to numeric"
    columns:
      - name: order_id
        data_tests: [not_null]
      - name: product_id
        data_tests: [not_null]
      - name: item_price
        data_tests: [not_null]

  - name: stg_customers
    description: "Customer location data, city lowercased, state uppercased"
    columns:
      - name: customer_id
        data_tests: [not_null, unique]
      - name: customer_state
        data_tests: [not_null]

  - name: stg_products
    description: "Product catalog with category and physical dimensions"
    columns:
      - name: product_id
        data_tests: [not_null, unique]

  - name: stg_reviews
    description: "Customer review scores per order"
    columns:
      - name: review_id
        data_tests: [not_null]
      - name: order_id
        data_tests: [not_null]
      - name: review_score
        data_tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
